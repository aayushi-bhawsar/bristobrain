name: BistroBrain CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────────
  # Lint & format check
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint tools
        run: pip install ruff black

      - name: Run Ruff (linter)
        run: ruff check . --output-format=github

      - name: Run Black (format check)
        run: black --check .

  # ─────────────────────────────────────────────
  # Unit & Integration tests
  # ─────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      chromadb:
        image: chromadb/chroma:latest
        ports:
          - 8001:8000
        options: >-
          --health-cmd "curl -f http://localhost:8000/api/v1/heartbeat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set test environment variables
        run: |
          echo "ANTHROPIC_API_KEY=test_key_ci" >> $GITHUB_ENV
          echo "CHROMA_HOST=localhost" >> $GITHUB_ENV
          echo "CHROMA_PORT=8001" >> $GITHUB_ENV
          echo "SQLITE_DB_PATH=/tmp/bistrobrain_test.db" >> $GITHUB_ENV
          echo "RESTAURANT_NAME=CI Test Bistro" >> $GITHUB_ENV
          echo "APP_ENV=test" >> $GITHUB_ENV

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --tb=short \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-omit=tests/*,synthetic_data/*,scripts/* \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────────
  # Synthetic data generation smoke test
  # ─────────────────────────────────────────────
  smoke-test:
    name: Smoke Test (data pipeline)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate synthetic data
        run: python synthetic_data/generate_pos_data.py --days 7

      - name: Verify CSV output
        run: |
          python -c "
          import csv, sys
          with open('synthetic_data/sample_data.csv') as f:
              rows = list(csv.DictReader(f))
          print(f'Generated {len(rows)} rows')
          required_cols = {'transaction_id', 'timestamp', 'item_name', 'category', 'quantity', 'unit_price', 'food_cost'}
          missing = required_cols - set(rows[0].keys())
          if missing:
              print(f'MISSING COLUMNS: {missing}', file=sys.stderr)
              sys.exit(1)
          print('All required columns present ✓')
          assert len(rows) > 0, 'No rows generated'
          print('Smoke test passed ✓')
          "

  # ─────────────────────────────────────────────
  # Docker build check
  # ─────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t bistrobrain:ci .

      - name: Verify image starts
        run: |
          docker run --rm -d \
            -e ANTHROPIC_API_KEY=test \
            -e APP_ENV=test \
            -p 8000:8000 \
            --name bistrobrain-ci \
            bistrobrain:ci &
          sleep 5
          curl -f http://localhost:8000/health || (docker logs bistrobrain-ci && exit 1)
          docker stop bistrobrain-ci
          echo "Docker health check passed ✓"
